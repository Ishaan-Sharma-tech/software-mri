appId: com.softwaremri.app
productName: Software MRI
directories:
  output: dist

win:
  target:
    - target: nsis
      arch: [x64]
    - target: msix
      arch: [x64]
  # icon: assets/icon.ico # We'll add this later

msix:
  identityName: SoftwareMRI
  applicationId: SoftwareMRI
  publisher: CN=YourName

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish:
  provider: github
  owner: your-github-username
  repo: software-mri
