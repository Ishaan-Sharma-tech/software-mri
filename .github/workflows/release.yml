name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build App and Installer
        # We use --publish never because we will upload it manually in the next step
        run: npx vite build && npx electron-builder --publish never
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # If triggered by workflow_dispatch (no tag), it will create a draft release.
          # If triggered by a tag, it creates a published release.
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          generate_release_notes: true
          draft: false
